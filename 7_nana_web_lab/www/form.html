<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация студента</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        .inline-label { display: inline; font-weight: normal; }
    </style>
</head>
<body>
    <h2>Регистрация нового студента</h2>
    <form action="send.php" method="POST">
        <div class="form-group">
            <label for="full_name">ФИО студента:</label>
            <input type="text" id="full_name" name="full_name" placeholder="Иванов Иван Иванович" required>
        </div>

        <div class="form-group">
            <label for="age">Возраст:</label>
            <input type="number" id="age" name="age" min="16" max="100" value="18" required>
        </div>

        <div class="form-group">
            <label for="faculty">Факультет:</label>
            <input type="text" id="faculty" name="faculty" placeholder="Информационных технологий" required>
        </div>

        <div class="form-group">
            <label>Форма обучения:</label>
            <input type="radio" name="education_form" id="och" value="Очная" checked>
            <label for="och" class="inline-label">Очная</label>
            
            <input type="radio" name="education_form" id="zaoch" value="Заочная">
            <label for="zaoch" class="inline-label">Заочная</label>
            
            <input type="radio" name="education_form" id="vech" value="Очно-заочная">
            <label for="vech" class="inline-label">Очно-заочная</label>
        </div>

        <div class="form-group">
            <label class="inline-label">
                <input type="checkbox" name="agree" value="1" required> 
                Согласен с правилами внутреннего распорядка
            </label>
        </div>

        <button type="submit">Зарегистрироваться</button>
    </form>
    <br>
    <a href="index.php">На главную</a>
</body>
</html>
