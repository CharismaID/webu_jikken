<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация студента</title>
</head>
<body>
    <h2>Регистрация нового студента</h2>
    <form action="send.php" method="POST">
        Имя: <input type="text" name="name" required><br><br>
        Возраст: <input type="number" name="age" required><br><br>
        Факультет: <input type="text" name="faculty" required><br><br>
        
        <label>
            <input type="checkbox" name="agreed" value="1" required> 
            Согласен с правилами
        </label><br><br>

        Форма обучения:<br>
        <input type="radio" name="study_form" value="Очная" checked> Очная
        <input type="radio" name="study_form" value="Заочная"> Заочная
        <input type="radio" name="study_form" value="Дистанционная"> Дистанционная<br><br>
        
        <button type="submit">Зарегистрироваться</button>
    </form>
</body>
</html>
