<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лабораторная работа №3 - Форма</title>
</head>
<body>

<h2>Форма заказа еды</h2>

<form id="orderForm" action="process.php" method="POST">
    Имя: <label>
        <input type="text" name="customer_name" required>
    </label><br><br>

    Email: <label>
        <input type="email" name="email" required>
    </label><br><br>

    Кол-во порций: <label>
        <input type="number" name="quantity" value="1" min="1">
    </label><br><br>

    Выберите блюдо:
    <label>
        <select name="food">
            <option value="Пицца">Пицца</option>
            <option value="Бургер">Бургер</option>
            <option value="Суши">Суши</option>
        </select>
    </label><br><br>

    <label>
        <input type="checkbox" name="extra_sauce" value="Да">
    </label> Добавить соус<br><br>

    Тип доставки: <br>
    <label>
        <input type="radio" name="delivery" value="Курьер" checked>
    </label> Курьер<br>
    <label>
        <input type="radio" name="delivery" value="Самовывоз">
    </label> Самовывоз<br><br>

    <button type="submit">Отправить заказ</button>
</form>

<script>
    document.getElementById("orderForm").addEventListener("submit", function () {
        const customerName = document.querySelector("[name='customer_name']").value;
        const food = document.querySelector("[name='food']").value;

        alert("Вы оформляете заказ на имя: " + customerName + "\nВыбранное блюдо: " + food);
    });
</script>

</body>
</html>
